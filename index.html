<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Shooter Game - First Person</title>
<style>
  body { margin: 0; font-family: Arial; background: #111; color: white; overflow: hidden; }
  #nameMenu, #menu, #onlineMenu, #leaderboard { position: absolute; width: 100%; text-align: center; top: 20%; }
  button { padding: 10px 20px; margin: 10px; font-size: 18px; cursor: pointer; }
  input { padding: 8px; font-size: 16px; margin-top: 20px; }
  canvas { display: block; }
</style>
</head>
<body oncontextmenu="return false" onbeforeunload="return 'Are you sure you want to leave?';">

<div id="nameMenu">
  <h1>Enter Your Name</h1>
  <input type="text" id="playerName" placeholder="Your Name">
  <br><button onclick="saveName()">Continue</button>
</div>

<div id="menu" style="display:none;">
  <h1>3D Shooter Game</h1>
  <button onclick="startSingle()">Single Player</button>
  <button onclick="showOnline()">Online</button>
  <button onclick="startSurvival()">Survival Mode</button>
</div>

<div id="onlineMenu" style="display:none;">
  <h1>Online Mode</h1>
  <button onclick="createGame()">Create Game</button>
  <button onclick="joinGame()">Join Game</button>
  <br><button onclick="goBack()">Back</button>
</div>

<div id="leaderboard" style="display:none;">
  <h1>Leaderboard</h1>
  <ol id="scoreList"></ol>
  <button onclick="restartGame()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let bullets = [], enemies = [];
let keys = {};
let gameRunning = false;
let score = 0;
let leaderboard = [];
let timer = 0;
let timerInterval;
let playerName = '';
let overlayCtx = null;
let gun;
let survivalMode = false;
const moveSpeed = 0.3;

const canvas = document.getElementById('gameCanvas');
const shootSound = new Audio('https://actions.google.com/sounds/v1/impacts/pistol_shot.ogg');
const enemyDeathSound = new Audio('https://actions.google.com/sounds/v1/impacts/explosion.ogg');
const playerHitSound = new Audio('https://actions.google.com/sounds/v1/impacts/crash.ogg');

function saveName() {
  const input = document.getElementById('playerName');
  if (input.value.trim() === '') { alert('Please enter a name'); return; }
  playerName = input.value.trim();
  document.getElementById('nameMenu').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
}

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202020); // Dark gray background

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({canvas});
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.position.set(0,1.5,0);
  camera.lookAt(0,1.5,-1);

  gun = new THREE.Group();
  const handleGeometry = new THREE.BoxGeometry(0.1,0.3,0.1);
  const handleMaterial = new THREE.MeshBasicMaterial({color:0x663300}); // Brown handle
  const handle = new THREE.Mesh(handleGeometry, handleMaterial);
  handle.position.set(0,-0.15,0);
  gun.add(handle);

  const barrelGeometry = new THREE.BoxGeometry(0.1,0.1,0.5);
  const barrelMaterial = new THREE.MeshBasicMaterial({color:0x999999}); // Gray barrel
  const barrel = new THREE.Mesh(barrelGeometry, barrelMaterial);
  barrel.position.set(0,0.05,0.25);
  gun.add(barrel);

  gun.position.set(0.5,-0.3,-0.5);
  camera.add(gun);
  scene.add(camera);

  overlayCtx = canvas.getContext('2d');
}

function startSingle() { survivalMode = false; startGame(); }
function startSurvival() { survivalMode = true; startGame(); }

function startGame() {
  document.getElementById('menu').style.display='none';
  document.getElementById('leaderboard').style.display='none';
  canvas.style.display='block';
  initThree();
  initGame();
}

function showOnline() { document.getElementById('menu').style.display='none'; document.getElementById('onlineMenu').style.display='block'; }
function goBack() { document.getElementById('onlineMenu').style.display='none'; document.getElementById('menu').style.display='block'; }
function createGame() { alert('Game created! (demo)'); startSingle(); }
function joinGame() { alert('Joined game! (demo)'); startSingle(); }
function restartGame() { startSingle(); }

function initGame() {
  bullets=[]; enemies=[]; keys={};
  gameRunning=true; score=0; timer=0;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{ if(gameRunning) timer++; },1000);
}

window.addEventListener('keydown', e=>{ if(e.key) keys[e.key.toLowerCase()]=true; });
window.addEventListener('keyup', e=>{ if(e.key) keys[e.key.toLowerCase()]=false; });

window.addEventListener('click', ()=>{
  if(!gameRunning || !scene || survivalMode) return;
  const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), new THREE.MeshBasicMaterial({color:0xffff00})); // yellow bullets
  bullet.position.set(camera.position.x, camera.position.y, camera.position.z-0.1);
  bullet.direction = new THREE.Vector3(0,0,-1);
  bullets.push(bullet);
  scene.add(bullet);
  shootSound.currentTime = 0; shootSound.play();
});

function spawnEnemy() {
  if(!gameRunning || !scene) return;
  let geometry = survivalMode ? new THREE.ConeGeometry(0.5,1,3) : new THREE.ConeGeometry(0.5,1,8);
  let material = new THREE.MeshBasicMaterial({color: Math.random()*0xffffff}); // random color for enemies
  const enemy = new THREE.Mesh(geometry, material);
  enemy.position.x=(Math.random()-0.5)*10;
  enemy.position.y=1+Math.random()*3;
  enemy.position.z=-20;
  enemy.speed=0.05 + Math.random()*0.05;
  enemies.push(enemy);
  scene.add(enemy);
}
setInterval(spawnEnemy,1000);

function update() {
  if(!gameRunning) return;
  if(keys['a']||keys['arrowleft']) camera.position.x-=moveSpeed;
  if(keys['d']||keys['arrowright']) camera.position.x+=moveSpeed;
  if(keys['w']||keys['arrowup']) camera.position.y+=moveSpeed;
  if(keys['s']||keys['arrowdown']) camera.position.y-=moveSpeed;

  bullets.forEach((b,i)=>{ b.position.addScaledVector(b.direction,0.5); if(b.position.z<-30){ scene.remove(b); bullets.splice(i,1); } });

  enemies.forEach((e,i)=>{
    if(survivalMode){
      const dir = new THREE.Vector3(camera.position.x - e.position.x, camera.position.y - e.position.y, camera.position.z - e.position.z).normalize();
      e.position.addScaledVector(dir, e.speed);
      if(e.position.distanceTo(camera.position) < 0.7){ playerHitSound.currentTime=0; playerHitSound.play(); endGame(); }
    } else {
      e.position.z+=e.speed;
      if(e.position.z>10){ scene.remove(e); enemies.splice(i,1); }
    }
  });

  if(!survivalMode){
    bullets.forEach((b,bi)=>{
      enemies.forEach((e,ei)=>{
        const dx=b.position.x-e.position.x; const dy=b.position.y-e.position.y; const dz=b.position.z-e.position.z;
        if(Math.sqrt(dx*dx+dy*dy+dz*dz)<0.7){
          scene.remove(b); scene.remove(e); bullets.splice(bi,1); enemies.splice(ei,1); score+=10;
          enemyDeathSound.currentTime = 0; enemyDeathSound.play();
          if(score>=500) endGame();
        }
      });
    });
  }
}

function draw(){ if(!gameRunning || !renderer || !scene) return; renderer.render(scene,camera); drawOverlay(); }
function drawOverlay(){ if(!overlayCtx) return;
  overlayCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
  overlayCtx.font='30px Arial'; overlayCtx.fillStyle='cyan';
  overlayCtx.fillText(`Time: ${timer}s`,20,40);
  overlayCtx.fillText(`Score: ${score}`,20,80);
}

function endGame(){
  gameRunning=false; canvas.style.display='none'; clearInterval(timerInterval);
  leaderboard.push({name:playerName,time:timer}); leaderboard.sort((a,b)=>a.time-b.time);
  const scoreList=document.getElementById('scoreList'); scoreList.innerHTML='';
  leaderboard.forEach(entry=>{ const li=document.createElement('li'); li.textContent=`${entry.name}: ${entry.time}s`; scoreList.appendChild(li); });
  document.getElementById('leaderboard').style.display='block';
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
